<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>144321802 - Music</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="music.css" />
  <script src="music.js" defer></script>
  <script src="https://unpkg.com/wavesurfer.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono&family=Share+Tech+Mono&family=Roboto+Mono:wght@100;400;700&display=swap" rel="stylesheet">

</head>
<body>
  <body class="music-page">
  <header>
    <div class="site-title-wrapper">
      <h1 class="site-title">
        <a href="index.html" style="color: inherit; text-decoration: none;">144321802</a>
      </h1>
      <div class="blinking-square"></div>
    </div>
    <nav>
      <a href="music.html" data-text="MUSIC" class="active">://music</a>
      <a href="design.html" data-text="DESIGN">://design</a>
    </nav>
    <a href="about.html" class="about-link">about</a>
  </header>

  <main class="music-page">
    <div class="music-layout">
      <!-- LEFT: Release list -->
      <aside class="release-list">
        <ul>
          <li data-release="cinder-skies" class="active">Cinder Skies</li>
          <li data-release="angels-egg">Angel’s Egg</li>
          <li data-release="scr-evangelion">::scr0evangelion.97//</li>
          <li data-release="route-119">Route 119</li>
          <li data-release="revenge">Revenge</li>
          <li data-release="syne">Syne</li>
        </ul>
      </aside>
  
      <!-- RIGHT: Release display -->
      <section class="release-display" id="releaseDisplay">
        <div class="release-content">
          <img id="releaseCover" src="assets/images/CinderSkiesThumbnailwebp.webp" alt="Cinder Skies Cover">
          <div class="release-info">
            <h2 id="releaseTitle">Cinder Skies</h2>
            <p id="releaseYear">144321802 – 2024</p>
            <p id="releaseLabel"></p>
            <p class="tracklistLabel">TRACKS:</p>
            <div id="releaseTracks" class="tracklist"></div>
            <div id="waveformWrapper" style="position: relative; display: inline-block;">
              <!-- Top dots -->
              <div class="wave-dots top-dots">
                <span></span><span></span><span></span>
              </div>
            
              <!-- Waveform -->
              <div id="waveform"></div>

            
              <!-- Bottom dots -->
              <div class="wave-dots bottom-dots">
                <span></span><span></span><span></span>
              </div>
            </div>
            <div id="playerControls" style="display: flex; align-items: center; gap: 8px;">
              <span id="playTimer">00:00 // 00:00</span>
              <button id="playPauseBtn" class="play"></button>
            </div>
            <div id="volumeControl">
              <label for="volumeBar">volume:</label>
              <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="1">
            </div>
            
          </div>
        </div>
      </section>
    </div>
  </main>
  

  <footer>
    <p>© 2025 144321802</p>
  </footer>
  

</body>
</html>
